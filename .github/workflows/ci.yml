name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: macos-26
    
    strategy:
      matrix:
        destination: ['platform=iOS Simulator,name=iPhone 17,OS=latest', 'platform=macOS']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Build and Test
        run: |
          if [ "${{ matrix.destination }}" == "platform=macOS" ]; then
            swift test --parallel
          else
            set -o pipefail && xcodebuild test -scheme DZNetworking -destination "${{ matrix.destination }}" | xcbeautify
          fi

  spm-build:
    name: SwiftPM Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Build
        run: swift build -v
