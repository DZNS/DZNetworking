name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: macos-26
    
    strategy:
      matrix:
        destination: ['platform=iOS Simulator,name=iPhone 17,OS=latest', 'platform=macOS']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Environment
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available | grep "iPhone 17"

      - name: Build and Test
        run: |
          if [ "${{ matrix.destination }}" == "platform=macOS" ]; then
            swift test --parallel
          else
            # Pre-boot the simulator to avoid timeout/hang during first run
            # We use a subshell to avoid failure if already booted
            xcrun simctl boot "iPhone 17" || true
            
            # Use -skipPackagePluginValidation to avoid some SPM-related warnings in xcodebuild
            # Explicitly set the SDK to iphonesimulator
            set -o pipefail && xcodebuild test \
              -scheme DZNetworking \
              -destination "${{ matrix.destination }}" \
              -sdk iphonesimulator \
              -skipPackagePluginValidation \
              -parallel-testing-enabled NO \
              | xcbeautify
          fi

  spm-build:
    name: SwiftPM Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build
        run: swift build -v
